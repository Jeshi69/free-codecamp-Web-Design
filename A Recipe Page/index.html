    <meta charset="UTF-8">

  <body>
    <h1>Chocolate Cake</h1>

    <p>A simple and delicious chocolate cake recipe you can make at home.</p>

    <h2>Ingredients</h2>
    <ul>
      <li>Flour</li>
      <li>Sugar</li>
      <li>Cocoa powder</li>
      <li>Eggs</li>
    </ul>

    <h2>Instructions</h2>
    <ol>
      <li>Preheat the oven.</li>
      <li>Mix all dry ingredients.</li>
      <li>Add eggs and mix well.</li>
      <li>Bake for 30 minutes.</li>
    </ol>
