<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Form</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(to right, #4e54c8, #8f94fb);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      background: white;
      padding: 30px;
      width: 100%;
      max-width: 700px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    #title {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }

    #description {
      text-align: center;
      margin-bottom: 25px;
      color: #666;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    label {
      font-weight: bold;
      margin-bottom: 5px;
      display: block;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .radio-group,
    .checkbox-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .radio-group label,
    .checkbox-group label {
      font-weight: normal;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      background: #4e54c8;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #373bb5;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1 id="title">Student Feedback Survey</h1>

    <p id="description">
      Please fill out this survey form to help us improve your learning experience.
    </p>

    <form id="survey-form">

      <div>
        <label id="name-label" for="name">Full Name</label>
        <input
          type="text"
          id="name"
          placeholder="Enter your full name"
          required
        >
      </div>

      <div>
        <label id="email-label" for="email">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
        >
      </div>

      <div>
        <label id="number-label" for="number">Age</label>
        <input
          type="number"
          id="number"
          min="10"
          max="100"
          placeholder="Enter your age"
        >
      </div>

      <div>
        <label for="dropdown">Favorite Subject</label>

        <select id="dropdown">
          <option value="math">Mathematics</option>
          <option value="programming">Programming</option>
          <option value="science">Science</option>
        </select>
      </div>

      <div>
        <label>How do you attend classes?</label>

        <div class="radio-group">
          <label>
            <input type="radio" name="attendance" value="online">
            Online
          </label>

          <label>
            <input type="radio" name="attendance" value="offline">
            Offline
          </label>
        </div>
      </div>

      <div>
        <label>Skills You Want to Learn</label>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" value="html">
            HTML
          </label>

          <label>
            <input type="checkbox" value="css">
            CSS
          </label>

          <label>
            <input type="checkbox" value="javascript">
            JavaScript
          </label>
        </div>
      </div>

      <div>
        <label for="comments">Additional Comments</label>

        <textarea
          id="comments"
          placeholder="Write your comments here..."
        ></textarea>
      </div>

      <button id="submit" type="submit">
        Submit Survey
      </button>

    </form>

  </div>

</body>
</html>
